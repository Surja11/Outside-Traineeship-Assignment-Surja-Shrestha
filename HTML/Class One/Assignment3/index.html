    <main>
        <form style="font-family: 'Times New Roman', Times, serif;">
            <h2>Zoo Keeper Application Form</h2>

            <em>Please complete the form. Mandatory fields are marked with <span style="color: red">*</span> </em>
            <br><br>

            <fieldset>

                <legend><b>CONTACT DETAILS</b></legend>
                <div>
                    <label for="name" class="label_name"><b>Name </b><span style="color:red">*</span></label>

            </fieldset>
            <br>
            <fieldset>

                <legend><b>PERSONAL INFORMATION</b></legend>
                <div>
                    <label for="age" class="label_name"> <span style="color:red">*</span> <b>Age</b></label>
                    <input type="number">
                </div>
                <div>

                    <select id="gender-select">
                        <option value="female">Female</option>
                        <option value="male">Male</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div>
                    <label for="question" style="vertical-align:top;" class="label_name"><b>When did you first know you
                            wanted to be a zoo-keeper?</b></label>
                    <textarea rows="6" cols="45"></textarea>
                </div>

            </fieldset>

            <br>
            <fieldset>

                <input type="checkbox" value="zebra">

                <label for="animal" class="label_name">Cat</label>
                </div>

                <label for="animal" class="label_name">Human</label>
                <br><br>
                <input type="checkbox" value="elephant">
