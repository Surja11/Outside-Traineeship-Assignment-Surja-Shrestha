<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 2</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- creating a session with margin of 48px given by m-6 class -->
    <section class="section m-6">
      <h2>Blog Section</h2>

      <p>Section with margin 48px</p>

      <!-- creating a card-container div for holding cards of different margin -->
      <div class="card-container">
        <!-- following are cards with different margin as given by spacing scale -->
        <div class="card m-5">
          <h3 class="card__title">SCSS</h3>
          <p class="card__body">Card with margin 32px</p>
        </div>

        <div class="card m-4">
          <h3 class="card__title">CSS</h3>
          <p class="card__body">Card with margin 24px</p>
        </div>

        <div class="card m-3">
          <h3 class="card__title">CSS</h3>
          <p class="card__body">Card with margin 16px</p>
        </div>
        <div class="card m-2">
          <h3 class="card__title">CSS</h3>
          <p class="card__body">Card with margin 8px</p>
        </div>
        <div class="card m-1">
          <h3 class="card__title">CSS</h3>
          <p class="card__body">Card with margin 4px</p>
        </div>
      </div>
    </section>
  </body>
</html>
