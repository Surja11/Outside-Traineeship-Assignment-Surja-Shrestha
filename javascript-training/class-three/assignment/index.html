<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <title>Lists Manager</title>
    <style>
        :root {
            --primary-color: rgb(233, 231, 231);
            --secondary-color: rgb(168, 168, 168);
        }

        * {
            padding: 0px;
            border: 0px;
            box-sizing: border-box;
        }

        body {
            background-color: var(--primary-color);
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            width: 100vw;

        }

        header {
            display: flex;
            justify-content: center;
            font-size: 28px;
        }

        main {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;

        }

        /* .overlay{
            width: 100vw;
            height: 100vh;
            background-color: rgba(0);
            position: fixed;
            inset: 0;
            display: none;
            z-index: 1;
        } */


        .card {
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .card__input {
            background-color: var(--secondary-color);
            padding: 8px;
            margin: 8px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            height: 60px;
            width: 50%;
            /* border-radius: 10px; */
        }

        .card__input input {
            border-radius: 10px;
            font-size: 20px;
            padding: 8px;
        }


        .card__icon {
            background-color: white;
            width: 50px;
            font-size: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
        }

        .btn {
            border-radius: 10px;
            font-size: 16px;
            background-color: var(--secondary-color);
            border: 2px solid black;
            cursor: pointer;
            transition: transform 0.3s ease-in-out;
        }

        .btn:hover {
            transform: scale(1.03);
        }

        .btn--add {
            width: 20%;
        }

        .btn--clear {
            width: 48%;
            padding: 20px;
        }

        .list {
            width: 48%;
            display: none;
        }

        .welcome {
            font-size: 32px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            /* position: relative; */
        }

        .cross {
            position: absolute;
            /* top: ; */
            /* left: 50%; */
            bottom: 85%;
            left: 85%;
            font-size: 20px;
            color: gray;
            cursor: pointer;

        }

        .overlay {
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.5);
            /* semi-transparent black */
            position: fixed;
            inset: 0;
            display: none;
            z-index: 99;
        }

        .found-items{
            display: none;
        }

        #search {
            width: 100%;
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
        }

        #add-items {
            width: 79%;
        }

        #modal {
            position: absolute;
            width: 350px;
            height: 350px;
            z-index: 100;
            background-color: white;
            display: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 0.5px solid gray;
        }

        #toast {
            position: absolute;
            right: 5%;
            width: 20%;
            padding: 20px;
            background-color: gray;
            top: 5%;
            border-radius: 10px;
            color: white;
            display: none;
        }
    </style>
</head>

<body>


    <div class="overlay"></div>
    <header>
        <h1>'List Manager'</h1>
    </header>

    <main>
        <p>Total Items: <span class="count"></span></p>
        <div class="card">
            <div class="card__input">
                <div class="card__icon">
                    <i class="fa-brands fa-sistrix"></i>

                </div>

                <input type="text" name="" id="search" placeholder="Search Items...">
            </div>
            <div class="card__input">
                <input type="text" name="" id="add-items" placeholder="Enter new item..">
                <button class="btn btn--add">ADD ITEM</button>
            </div>
            </card>
            <div class="found-items"></div>
            <div class="list">

            </div>

            <button class="btn btn--clear" disabled>CLEAR ALL ITEMS</button>
            <div id="modal">

                <span class="welcome">
                    <i class="fa-solid fa-x cross"></i>
                    <span>Welcome to our</span> <span>List Manager</span></span>
            </div>
            <div id="toast"> </div>
        </div>


    </main>

</body>

<script>
    let itemsCount = 0;
    console.log(itemsCount);




    window.addEventListener("load", () => {

        document.getElementById("modal").style.display = "block";
        document.getElementsByClassName("overlay")[0].style.display = "block";
        setTimeout(() => {
            document.getElementById("modal").style.display = "none";
            document.getElementsByClassName("overlay")[0].style.display = "none";
        }, 1000);

    })

    function timeout(action, sec) {
        setTimeout(() => {
            action.style.display = "none";
        }, sec)
    }
    const crossIcon = document.getElementsByClassName('cross')[0];
    const clearBtn = document.getElementsByClassName('btn--clear')[0];
    const toast = document.getElementById('toast');
    const searchBox = document.getElementById('search');


    let intervalId;
 
    const foundItems = document.getElementsByClassName('found-items')[0];
    function debounce() {
    clearTimeout(intervalId);

    intervalId = setTimeout(() => {
        const searchValue = searchBox.value.trim().toLowerCase();
        const arrayItems = Array.from(document.getElementsByClassName('list-items'));

        let matchCount = 0;

        arrayItems.forEach((item) => {
            const card = item.closest('.list-card');
            if (item.textContent.toLowerCase().includes(searchValue)) {
                card.style.display = 'flex';
                matchCount++;
            } else {
                card.style.display = 'none';
            }
        });

        // after forEach, check if anything matched
        if (matchCount === 0 && arrayItems.length > 0) {
            foundItems.textContent = 'No items found!';
            foundItems.style.display = 'block';
        } else {
            foundItems.style.display = 'none';
        }

    }, 500);
}

    searchBox.addEventListener("input",debounce);
    crossIcon.addEventListener('click', () => {
        document.getElementById("modal").style.display = "none";
    })

    const listBox = document.getElementsByClassName('list')[0];
        const unorderedList = document.createElement('ul');


    document.getElementsByClassName('count')[0].textContent = itemsCount;
    const addBtn = document.getElementsByClassName('btn--add')[0];
    addBtn.addEventListener('click', () => {
        const addItem = document.getElementById('add-items');
        const item = addItem.value.trim();
        listBox.appendChild(unorderedList);


        if (item) {
            listBox.style.display = "block";
            const listCard = document.createElement('div');
            const listItem = document.createElement('li');
            const removeBtn = document.createElement('button');
            const prefix = '--';


            listCard.style.width = "100%";
            listCard.style.borderStyle = "dashed";
            listCard.style.borderWidth = "1px";
            listCard.style.borderCollapse = "black";
            listCard.style.borderRadius = "10px";
            listCard.style.padding = "15px 5px 15px 25px";
            listCard.style.margin = "8px 0";
            listCard.style.display = "flex";
            listCard.style.justifyContent = "space-between";
            listCard.style.alignItems = "center";
            listCard.classList.add("list-card");

            removeBtn.textContent = 'Remove';
            removeBtn.classList.add("btn");
            removeBtn.style.padding = "8px 15px";


            listItem.textContent = `${prefix}${item}${prefix}`;
            listItem.style.listStyleType = "none";
            listItem.style.fontSize = "20px";
            listItem.classList.add('list-items');


            unorderedList.appendChild(listCard);
            listCard.appendChild(listItem);
            listCard.appendChild(removeBtn);
            addItem.value = '';
            clearBtn.removeAttribute('disabled');
            console.log('hi');
            console.log(itemsCount);

            itemsCount++;
            document.getElementsByClassName('count')[0].textContent = itemsCount;
            toast.style.display = "block";
            toast.textContent = "Item Added!";
            timeout(toast, 2000);
        }

        const taskList = document.getElementsByClassName('list-card');
        const taskArray = Array.from(taskList);
        console.log(taskArray);
        taskArray.forEach((task) => {
            task.addEventListener("mouseenter", () => {
                console.log("mouseenter worked");
                task.style.backgroundColor = "gray";
                task.style.cursor = "pointer";
            });
            task.addEventListener("mouseleave", () => {
                console.log("mouseleave happened");
                task.style.backgroundColor = "rgb(233, 231, 231)";
            })
        })

    })
    unorderedList.addEventListener('click', (e) => {
    if (e.target.classList.contains('btn') && e.target.textContent === 'Remove') {
        e.target.parentElement.remove();

        itemsCount--;
        document.getElementsByClassName('count')[0].textContent = itemsCount;
        toast.style.display = "block";
        toast.textContent = "Item Removed!";
        timeout(toast, 2000);

        if (unorderedList.children.length === 0) {
            listBox.style.display = "none";
            clearBtn.setAttribute('disabled', true);
        }
    }
})



    clearBtn.addEventListener('click', () => {
        listBox.innerHTML = '';
        toast.textContent = "All Items Cleared!";
        timeout(toast, 2000);
        itemsCount = 0;
        document.getElementsByClassName('count')[0].textContent = itemsCount;
        clearBtn.setAttribute('disabled', true);
    })
</script>

</html>
