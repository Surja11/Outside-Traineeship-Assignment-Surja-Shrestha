<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Class Assignment One</title>
    <script>

     // loop through 1 to 100
      for (let i = 1; i <= 100; i++) {
        // if the number is divisible by 1 and 5 then print "FizzBuzz"
        if (i % 3 == 0 && i % 5 == 0) {
          console.log("FizzBuzz");
        } 
        // Else if number is divisible by 3 then print "Fizz"
        else if (i % 3 == 0) {
          console.log("Fizz");
        } 
        //  Else if number is divisible by 5 then print "Buzz"
        else if (i % 5 == 0) {
          console.log("Buzz");
        } 
        // Else print the number
        else {
          console.log(i);
        }
      }
    </script>
  </head>
  <body></body>
</html>
