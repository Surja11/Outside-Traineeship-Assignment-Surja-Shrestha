<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bio Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <style>

/* declaring the variables */
:root {
        --gradient-color1: #fbfd94;
        --gradient-color2: #c8802c;
        --bg-color: #ffffff;
        --primary-color: #7c6957;
        --secondary-color: #8e7e6d;
        --profile-button: #f5e8df;
      }

      * {
        margin: 0;
        padding: 0;
      }

      body {
        height: 100vh;
        overflow: hidden;
        background: linear-gradient(
          30deg,
          var(--gradient-color1),
          var(--gradient-color2)
        );
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "Open Sans", sans-serif;
      }


      /* creating grid for profile */
      .profile {
        display: grid;
        width: 100%;
        max-width: 940px;
        grid-template-columns: 2fr 1.18fr;
        grid-template-rows: 1fr 1fr 1fr;
        background-color: var(--bg-color);
      }


      .profile__picture {
        grid-row: span 2;
        color: var(--primary-color);
        font-size: 48px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: relative;
      }

      img {
        width: 208px;
        height: 208px;
        border-radius: 50%;
        position: relative;
      }

      /* creating semicircle over profile picture */
      .profile__picture--pic::before {
        content: "";
        position: absolute;
        width: 220px;
        height: 220px;
        border-bottom: 3px solid var(--primary-color);
        border-right: 3px solid var(--primary-color);
        border-left: 3px solid var(--primary-color);
        border-top: 3px solid transparent;
        border-radius: 50%;
        top: 34.4%;
        left: 50%;
        transform: translate(-50%, -50%);
        transform-origin: center;
      }

      /* creating semicircle over profile picture */
      .profile__picture--pic::after {
        content: "";
        position: absolute;
        width: 240px;
        height: 240px;
        border-top: 3px solid var(--primary-color);
        border-bottom: 3px solid transparent;
        border-right: 3px solid var(--primary-color);
        border-left: 3px solid var(--primary-color);
        border-radius: 50%;
        top: 35%;
        left: 50%;
        transform: translate(-50%, -50%);
        transform-origin: center;
      }

      /* invoking animation of rotating the semicircle on hover */
      .profile__picture--pic:hover::before {
        animation: rotateinner 2s linear infinite;
      }
/* invoking animation of rotating the semicircle on hover */
      .profile__picture--pic:hover::after {
        animation: rotateouter 2s linear infinite;
      }

      /* animation */
      @keyframes rotateinner {
        from {
          transform: translate(-50%, -50%) rotate(0deg);
        }

        to {
          transform: translate(-50%, -50%) rotate(360deg);
        }
      }

      @keyframes rotateouter {
        from {
          transform: translate(-50%, -50%) rotate(0deg);
        }

        to {
          transform: translate(-50%, -50%) rotate(-360deg);
        }
      }

      .profile__picture--designation {
        font-size: 30px;
        color: var(--secondary-color);
      }

      /* designing of profile buttons */
      .profile__buttons {
        background-color: var(--profile-button);
        width: 100%;
        max-width: 348px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        border: none;
        padding: 50px;
        flex-shrink: 1;
        transition:
          background-color 0.3s ease-out,
          transform 0.3s ease-in;
      }

      /* if the profile buttons is not last child then putting the margin bottom */
      .profile__buttons:not(:last-child) {
        margin-bottom: 4px;
      }

      .profile__buttons h1 {
        font-size: 56px;
        color: #7c6957;
      }

      .profile__buttons span {
        font-size: 32px;
        color: #8e7e6d;
      }

      .profile__primarybuttons {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding-bottom: 10%;
      }

      .profile__buttons:hover {
        background-color: #cbbfb6;
        cursor: pointer;
      }

      .profile__buttons:hover > h1 {
        transform: scale(1.1);
      }

      .profile__primarybuttons--contact {
        width: 100%;
        max-width: 356px;
        border: 4px solid var(--primary-color);
        border-radius: 50px;
        /* font-weight: 600; */
        padding: 20px;
        margin: 10px;
        font-size: 36px;
        color: var(--primary-color);
        transition:
          background-color 0.2s ease-in,
          color 0.2s ease-in;
      }

      .profile__primarybuttons--contact:hover {
        background-color: var(--primary-color);
        color: var(--bg-color);
        cursor: pointer;
      }

      @media (max-width: 860px) {
        img {
          width: 120px;
          height: 120px;
          border-radius: 50%;
          position: relative;
        }

        .profile__picture--pic::before {
          content: "";
          position: absolute;
          width: 125px;
          height: 125px;
          border-bottom: 3px solid var(--primary-color);
          border-right: 3px solid var(--primary-color);
          border-left: 3px solid var(--primary-color);
          border-top: 3px solid transparent;
          border-radius: 50%;
          top: 36%;
          left: 50%;
          transform: translate(-50%, -50%);
        }

        .profile__picture--pic::after {
          content: "";
          position: absolute;
          width: 140px;
          height: 140px;
          border-top: 3px solid var(--primary-color);
          border-bottom: 3px solid transparent;
          border-right: 3px solid var(--primary-color);
          border-left: 3px solid var(--primary-color);
          border-radius: 50%;
          top: 36%;
          left: 50%;
          transform: translate(-50%, -50%);
        }

        .profile__picture {
          font-size: 30px;
        }

        .profile__picture span {
          font-size: 26px;
        }

        .profile__buttons h1 {
          font-size: 36px;
        }

        .profile__buttons span {
          font-size: 24px;
        }

        .profile__primarybuttons--contact {
          font-size: 22px;
          padding: 10px 6px;
          width: 80%;
          border: 3px solid var(--primary-color);
        }
      }

      @media (max-width: 438px) {
        img {
          width: 80px;
          height: 80px;
          border-radius: 50%;
          position: relative;
        }

        .profile__picture--pic::before {
          content: "";
          position: absolute;
          width: 90px;
          height: 90px;
          border-bottom: 2px solid var(--primary-color);
          border-right: 2px solid var(--primary-color);
          border-left: 2px solid transparent;
          border-top: 2px solid var(--primary-color);
          border-radius: 50%;
          top: 38%;
          left: 50%;
          transform: translate(-50%, -50%);
        }

        .profile__picture--pic::after {
          content: "";
          position: absolute;
          width: 100px;
          height: 100px;
          border-top: 2px solid var(--primary-color);
          border-bottom: 2px solid var(--primary-color);
          border-right: 2px solid transparent;
          border-left: 2px solid var(--primary-color);
          border-radius: 50%;
          top: 38%;
          left: 50%;
          transform: translate(-50%, -50%);
        }

        .profile__picture {
          font-size: 20px;
        }

        .profile__picture span {
          font-size: 18px;
        }

        .profile__buttons h1 {
          font-size: 20px;
        }

        .profile__buttons span {
          font-size: 18px;
        }

        .profile__primarybuttons--contact {
          font-size: 18px;
          width: 80%;
          border: 2px solid var(--primary-color);
        }
      }
    </style>
  </head>

  <body>
    <main class="profile">
      <div class="profile__picture">
        <div class="profile__picture--pic">
          <img src="./profile.png" alt="profile" />
        </div>

        <h2>Jessica Potter</h2>
        <span>Visual Artist</span>
      </div>
      <button class="profile__posts profile__buttons">
        <h1>523</h1>
        <span>Posts</span>
      </button>
      <button class="profile__likes profile__buttons">
        <h1>1387</h1>
        <span>Likes</span>
      </button>
      <div class="profile__primarybuttons">
        <button class="profile__primarybuttons--contact">Follow</button>
        <button class="profile__primarybuttons--contact">Message</button>
      </div>
      <button class="profile__followers profile__buttons">
        <h1>146</h1>
        <span>Follower</span>
      </button>
    </main>
  </body>
</html>
