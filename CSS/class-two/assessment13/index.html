<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bio Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css">

</head>

<body>

    <!-- considering main as a block -->
    <main class="profile-card">

        <!-- The section acts as an element inside the block, which is why named profile-card__info -->
        <section class="profile-card__info">

        
            <div class="profile-card__image-container">
                <img src="./profile.png" alt="profile" class="profile-card__image" />
            </div>

            <h2 class="profile-card__title">Jessica Potter</h2>
            <span class="profile-card__subtitle">Visual Artist</span>
            <div class="profile-card__button-container">
                <button class="button">Follow</button>
                <button class="button button--dark">Message</button>
            </div>

        </section>

        <!-- This is another section acting as a element inside block -->
        <section class="profile-card__statistic">
        <button class="profidle-card__statistic-button">
            <h1 class="profile-card__statistic-count">523</h1>
            <span class="profile-card__statistic-type">Posts</span>
        </button>
        
        <button class="profile-card__statistic-button profile-card__statistic-button--dark">
            <h1 class="profile-card__statistic-count">1387</h1>
            <span class="profile-card__statistic-type">Likes</span>
        </button>

        <button class="profile-card__statistic-button">
            <h1 class="profile-card__statistic-count">146</h1>
            <span class="profile-card__statistic-type">Follower</span>
        </button>
        </section>
    </main>
</body>

</html>
