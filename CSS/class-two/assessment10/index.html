<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <style>
        li {
            position: relative;
            padding: 20px 20px 20px 35px;
            font-size: 1.1rem;
            list-style-type: none;
            font-family: "Comic Neue", cursive;
        }

        .listbox {
            padding: 20px;

        }

        
        li::before {
            content: '';
            position: absolute;
            transform: rotate(-35deg);
            height: 6px;
            width: 14px;
            left: 0px;
            border-left: 0.15rem solid white;
            border-bottom: 0.15rem solid white;
            z-index: 10;
            top: 45%;
        }

        
        li::after {
            content: '';
            color: white;
            border: 0.2rem solid black;
            border-radius: 50%;
            position: absolute;
            height: 18px;
            background-color: black;
            width: 18px;
            left: -4px;
            top: 35%
        }
    </style>
</head>

<body>
    <div class="listbox">
        <ul>
            <li class="list">Lorem ipsum dolor sit amet consectetur adipisicing elit.</li>
            <li class="list">Lorem ipsum dolor sit amet consectetur adipisicing elit.</li>
            <li class="list">Lorem ipsum dolor sit amet consectetur adipisicing elit.</li>
        </ul>

    </div>

</body>

</html>
