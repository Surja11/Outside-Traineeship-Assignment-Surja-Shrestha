<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    h1{
        text-align: center;
    }
    .rotation-element {
      position: relative;
      left: 42%;
      top: 50%;
      height: 100px;
      width: 100px;
      margin: 100px;
      animation-name: gif;
      animation-duration: 2s;
      animation-iteration-count: infinite;
    }

    @keyframes gif {
      0% {
        background-color: rgb(147, 226, 196);
        height: 40px;
        width: 40px;
        border-radius: 50%;
      }

      33% {
        height: 100px;
        width: 100px;
        border-radius: 0%;
        transform: rotate(-360deg);
      }
      66% {
        width: 100px;
        height: 100px;
        border-radius: 0%;
        background-color: rgb(255, 167, 182);
        transform: rotate(-360deg);
      }

      100% {
         background-color: rgb(147, 226, 196);
        height: 40px;
        width: 40px;
        border-radius: 50%;
        transform: rotate(-360deg);
      }
    }
  </style>
  <body>
    <h1>GIF creation with KeyFrames</h1>
    <div class="rotation-element"></div>
  </body>
</html>
