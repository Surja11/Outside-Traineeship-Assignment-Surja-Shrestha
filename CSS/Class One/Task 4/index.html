<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      h2 {
        font-size: 28px;
      }
      .top {
        padding: 26px 8px;
        background-color: gray;
        color: white;
        font-weight: bold;
        font-size: 28px;
      }

      .left {
        float: left;
        margin: 16px 30px 16px 16px;
      }

      .left p {
        margin-bottom: 8px;
        background-color: skyblue;
        padding: 8px;
        width: 200px;
        color: white;
      }

      .right {
        padding-top: 40px;
      }

      .right p {
        margin-bottom: 8px;
        font-size: 1.1rem;
      }
      .footer {
        clear: both;
        width: 100%;
        padding: 20px 8px;
        background-color: gray;
        margin-bottom: 15px;
        color: white;
      }
    </style>
  </head>
  <body>
    <header class="top">Chania</header>
    <main>
      <section class="left">
        <p>The Flight</p>
        <p>The City</p>
        <p>The Island</p>
        <p>The Food</p>
      </section>
      <section class="right">
        <h2>The City</h2>
        <p>
          Chania is the capital of the Chania region on the island of Crete. The
          city can be divided in two parts, the old town and the modern city.
        </p>
        <p>
          You will learn more about web layout and responsive web pages in a
          later chapter
        </p>
      </section>
    </main>

    <footer class="footer">Footer text</footer>
  </body>
</html>
