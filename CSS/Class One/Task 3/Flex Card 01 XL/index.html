<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Assignment</title>
</head>

<style>
    body{
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 50px;
    }
    img{
        width: 850px;
        height: 379.2px;
    }
    .division{
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        width: 1290px;
    }
    .big-text{
        font-size: 40px;
        font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    }
    .small-text{
        width: 329.51px;
        font-size: 20px;
        font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    }
</style>
<body>
    <section class="division">
        <div class="image">
            <img src="./img.jpg" alt="image"/>
        </div>
        <div class="text">
            <b class="big-text">Far far away, behind the word mountains</b>
            <p class="small-text">Far far away, behind the word mountains, far from the countries Vokalia and Consonantia....</p>
        </div>
    </section>

    <section class="division">
        <div class="text">
            <b class="big-text">Far far away, behind the word mountains</b>
            <p class="small-text">Far far away, behind the word mountains, far from the countries Vokalia and Consonantia....</p>
        </div>
        <div class="image">
            <img src="./img2.jpg"/>
        </div>


    </section>
    
</body>
</html>
